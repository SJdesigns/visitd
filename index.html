<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visitd</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="shortcut icon" type="image/x-icon" href="img/logo.png">
    <!-- Link a los iconos de Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <!-- Script de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Cargar configuración de Supabase (funciona en Apache y Vercel) -->
    <script src="js/loadConfig.js"></script>
    <!-- Script para SHA1 hashing de contraseñas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <!-- Contenedor principal de la aplicación -->
    <div id="app">
        <!-- Navegación principal -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-logo">
                    <h1>visitd</h1>
                </div>
                <ul class="navbar-menu">
                    <div class="navbar-item" id="navbar-home">
                        <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#1f1f1f"><path d="M226.67-186.67h140V-400q0-14.17 9.58-23.75t23.75-9.58h160q14.17 0 23.75 9.58t9.58 23.75v213.33h140v-380L480-756.67l-253.33 190v380Zm-66.67 0v-380q0-15.83 7.08-30 7.09-14.16 19.59-23.33L440-810q17.45-13.33 39.89-13.33T520-810l253.33 190q12.5 9.17 19.59 23.33 7.08 14.17 7.08 30v380q0 27.5-19.58 47.09Q760.83-120 733.33-120H560q-14.17 0-23.75-9.58-9.58-9.59-9.58-23.75v-213.34h-93.34v213.34q0 14.16-9.58 23.75Q414.17-120 400-120H226.67q-27.5 0-47.09-19.58Q160-159.17 160-186.67ZM480-472Z"/></svg>
                    </div>
                    <div class="navbar-item" id="navbar-systems">
                        <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#1f1f1f"><path d="M586-127.67 352.67-210l-187.34 74q-8.66 3.33-16.5 1.83-7.83-1.5-14.5-5.83-6.66-4.33-10.5-11.17Q120-158 120-167v-563.67q0-13 7.5-23t19.83-15l183.34-63.66q5.33-2 10.83-2.67 5.5-.67 11.17-.67 5.66 0 11.16.67t10.84 2.67L608-750.67l186.67-74q8.66-3.33 16.5-2.16 7.83 1.16 14.5 5.5 6.66 4.33 10.5 11.5 3.83 7.16 3.83 16.16v568.34q0 11.66-7.5 20.33-7.5 8.67-19.17 13L630-127.67q-5.33 2-10.83 2.67-5.5.67-11.17.67t-11.17-.67q-5.5-.67-10.83-2.67Zm-14-75v-492.66L388-758v492.67l184 62.66Zm66.67 0 134.66-44.66v-499.34l-134.66 51.34v492.66Zm-452-11.33 134.66-51.33V-758l-134.66 44.67V-214Zm452-481.33v492.66-492.66ZM321.33-758v492.67V-758Z"/></svg>
                    </div>
                    <div class="navbar-item" id="navbar-settings">
                        <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#1f1f1f"><path d="M425-80q-18.33 0-32.17-12-13.83-12-16.5-30l-13-84.67q-17-6.33-34.83-16.66-17.83-10.34-32.17-21.67l-78 35.33Q200.67-202 183-208q-17.67-6-27.67-22.33L101-327q-10-16.33-5.67-34.33 4.34-18 19.34-29.67l71-52.67q-1.67-8.33-2-18.16-.34-9.84-.34-18.17 0-8.33.34-18.17.33-9.83 2-18.16l-71-52.67q-15-11.67-19.34-29.67Q91-616.67 101-633l54.33-96.67Q165.33-746 183-752t35.33 1.67l78 35.33q14.34-11.33 32.34-21.67 18-10.33 34.66-16l13-85.33q2.67-18 16.5-30 13.84-12 32.17-12h110q18.33 0 32.17 12 13.83 12 16.5 30l13 84.67q17 6.33 35.16 16.33 18.17 10 31.84 22l78-35.33q17.66-7.67 35-1.67Q794-746 804-729.67L859-633q10 16.33 5.67 34.67Q860.33-580 845.33-569l-71 51.33q1.67 9 2 18.84.34 9.83.34 18.83 0 9-.34 18.5Q776-452 774-443l71 52q15 11 19.33 29.33 4.34 18.34-5.66 34.67L804-230.33Q794-214 776.33-208q-17.66 6-35.33-1.67L663.67-245q-14.34 11.33-32 22-17.67 10.67-35 16.33l-13 84.67q-2.67 18-16.5 30Q553.33-80 535-80H425Zm12.33-66.67h85l14-110q32.34-8 60.84-24.5T649-321l103.67 44.33 39.66-70.66L701-415q4.33-16 6.67-32.17Q710-463.33 710-480q0-16.67-2-32.83-2-16.17-7-32.17l91.33-67.67-39.66-70.66L649-638.67q-22.67-25-50.83-41.83-28.17-16.83-61.84-22.83l-13.66-110h-85l-14 110q-33 7.33-61.5 23.83T311-639l-103.67-44.33-39.66 70.66L259-545.33Q254.67-529 252.33-513 250-497 250-480q0 16.67 2.33 32.67 2.34 16 6.67 32.33l-91.33 67.67 39.66 70.66L311-321.33q23.33 23.66 51.83 40.16 28.5 16.5 60.84 24.5l13.66 110Zm43.34-200q55.33 0 94.33-39T614-480q0-55.33-39-94.33t-94.33-39q-55.67 0-94.5 39-38.84 39-38.84 94.33t38.84 94.33q38.83 39 94.5 39ZM480-480Z"/></svg>
                    </div>
                    <!--<li><a href="#" data-page="home" class="nav-link active">Inicio</a></li>
                    <li><a href="#" data-page="systems" class="nav-link">Sistemas</a></li>
                    <li><a href="#" data-page="settings" class="nav-link">Configuración</a></li>-->
                </ul>
            </div>
        </nav>

        <!-- Contenedor principal de páginas -->
        <main class="main-content">
            <!-- Página HOME -->
            <div id="page-home" class="page active">
                <div class="page-container">
                    <div class="page-header">
                        <h2>Mis Sistemas de Metro</h2>
                        <button id="addSystemBtn" class="btn btn-primary">
                            <span class="material-icons">add</span>
                            Añadir Sistema
                        </button>
                    </div>

                    <div id="systemsList" class="systems-grid">
                        <!-- Los sistemas se cargarán aquí dinámicamente -->
                    </div>
                    <div id="systemsLoading">
                        <div id="loading">
                            <div id="loadingCenter">
                                <div class="showbox">
                                <div class="loader">
                                    <svg class="circular" viewBox="25 25 50 50">
                                    <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-width="2" stroke-miterlimit="10"/>
                                    </svg>
                                </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="noSystemsMessage" class="empty-state">
                        <span class="material-icons">landscape</span>
                        <p>No tienes sistemas añadidos aún</p>
                        <p class="subtitle">Haz clic en "Añadir Sistema" para comenzar</p>
                    </div>
                </div>
            </div>

            <!-- Página SYSTEMS -->
            <div id="page-systems" class="page">
                <div class="page-container">
                    <div class="page-header">
                        <h2>Todos los Sistemas de Metro</h2>
                        <button id="backToHomeBtn" class="btn btn-secondary">
                            <span class="material-icons">arrow_back</span>
                            Volver
                        </button>
                    </div>

                    <div id="allSystemsList" class="systems-grid">
                        <!-- Todos los sistemas se cargarán aquí dinámicamente -->
                    </div>
                </div>
            </div>

            <!-- Página MAP -->
            <div id="page-map" class="page">
                <div class="map-container">
                    <!-- El SVG del mapa se cargará aquí dinámicamente -->
                    <div id="mapContent" class="map-content"></div>

                    <!-- Controles del mapa -->
                    <div class="map-controls">
                        <h1>visitd</h1>
                        <div id="message-area">
                        </div>
                        <button id="backToHomeMapBtn" class="control-btn" title="Volver">
                            <span class="material-icons">arrow_back</span>
                        </button>
                        <button id="zoomInBtn" class="control-btn" title="Ampliar">
                            <span class="material-icons">zoom_in</span>
                        </button>
                        <button id="zoomOutBtn" class="control-btn" title="Reducir">
                            <span class="material-icons">zoom_out</span>
                        </button>
                        <button id="resetMapBtn" class="control-btn" title="Restablecer">
                            <span class="material-icons">filter_center_focus</span>
                        </button>
                    </div>

                    <div id="map-right-panels">
                        <!-- Panel de información del sistema (derecha) -->
                        <div class="map-panel system-info-panel">
                            <div class="panel-header">
                                <h3>Información del Sistema</h3>
                            </div>
                            <div id="systemInfoContent" class="panel-content">
                                <!-- La información se cargará aquí dinámicamente -->
                            </div>
                        </div>

                        <!-- Panel de estaciones visitadas (derecha abajo) -->
                        <div class="map-panel visited-stations-panel">
                            <div class="panel-header">
                                <h3>Estaciones Visitadas</h3>
                                <span id="visitedCount" class="badge">0</span>
                            </div>
                            <div id="visitedStationsList" class="panel-content">
                                <!-- Las estaciones visitadas se cargarán aquí dinámicamente -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Página SETTINGS -->
            <div id="page-settings" class="page">
                <div class="page-container">
                    <div class="page-header">
                        <h2>Configuración</h2>
                    </div>

                    <div class="settings-content">
                        <div class="settings-section">
                            <h3>Información de la Cuenta</h3>
                            <div class="setting-item">
                                <label>Nombre de Usuario:</label>
                                <p id="settingsUsername">-</p>
                            </div>
                            <div class="setting-item">
                                <label>Fecha de Creación:</label>
                                <p id="settingsJoinDate">-</p>
                            </div>
                        </div>

                        <div class="settings-section">
                            <h3>Sesión</h3>
                            <button id="logoutBtn" class="btn btn-danger">
                                <span class="material-icons">logout</span>
                                Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Diálogo modal para estaciones -->
    <div id="stationDialog" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="closeStationDialog">
                <span class="material-icons">close</span>
            </button>
            <div id="stationDialogContent">
                <!-- El contenido se cargará aquí dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Overlay para el modal -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;"></div>

    <!-- Scripts de la aplicación -->
    <script src="js/database.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/mapInteraction.js"></script>
    <script src="js/stationDialog.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
