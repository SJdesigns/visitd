<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visitd - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
    <!-- Link a los iconos de Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <!-- Script de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Cargar configuración de Supabase (funciona en Apache y Vercel) -->
    <script src="../js/loadConfig.js"></script>
    <!-- Script para SHA1 hashing de contraseñas -->
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>-->
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <h1>visitd</h1>
                <p>Registra tus visitas a las estaciones de metro</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Introduce tu usuario"
                        required
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Introduce tu contraseña"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="error-message" id="loginError"></div>

                <button type="submit" class="login-button">
                    <span class="material-icons">login</span>
                    Iniciar Sesión
                </button>
            </form>

            <div class="loading-spinner" id="loadingSpinner" style="display: none;">
                <div class="spinner"></div>
                <p>Verificando datos...</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
